name: Release MotionSlice

on:
  push:
    tags:
      - 'v*' # 只有当你推了 v 开头的 tag（比如 v1.0.0）才会触发流水线
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 使用 include 来明确指定操作系统和对应的 CPU 架构
        include:
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64  # 打包出 Mac M芯片 (ARM) 包
          - os: macos-13
            arch: x64    # 利用交叉编译，打包出 Mac Intel (x86) 包

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 请确认这是否与你本地开发的 Node 版本一致

      - name: 安装依赖
        run: npm install

      - name: 执行打包 (Make)
        run: npx electron-forge make --arch=${{ matrix.arch }}

      - name: 区分 Mac 安装包名称
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
        run: |
          # ${{ github.ref_name }} 会自动获取当前触发流水线的 tag (例如 v0.0.1)
          TAG_NAME=${{ github.ref_name }}
          find out/make -name "*.dmg" | while read file; do
            # 结果示例: MotionSlice-v0.0.1-x64.dmg
            mv "$file" "${file%.dmg}-${TAG_NAME}-${{ matrix.arch }}.dmg"
          done

      - name: 上传安装包到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/make/**/*.exe
            out/make/**/*.zip
            out/make/**/*.dmg
        env:
          # 这是 GitHub 自动提供的令牌，用于授权上传文件
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}